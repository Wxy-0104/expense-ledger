<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Expense Ledger</title>
    <link rel="stylesheet" href="./style.css">
</head>

<body>
    <header>
        <div class="header-row">
            <div class="header-text">
                <h1 data-i18n="app_title">Expense Ledger</h1>
                <p data-i18n="app_subtitle">Personal reimbursement record tool</p>
            </div>

            <div class="header-lang">
                <label class="lang-label">
                    <span data-i18n="lang_label">Language</span>
                    <select id="langSelect" aria-label="Language">
                        <option value="en">English</option>
                        <option value="ja">日本語</option>
                    </select>
                </label>
            </div>
        </div>
    </header>

    <main>
        <section class="actions">
            <button id="addBtn" data-i18n="btn_add_expense">+ Add Expense</button>
        </section>

        <section class="filters">
            <input type="text" id="searchInput" data-i18n-placeholder="placeholder_search"
                placeholder="Search Notes...">
            <select id="categoryFilter">
                <option value="" data-i18n="filter_all_categories">All Categories</option>
                <option value="transport" data-i18n="cat_transport">Transport</option>
                <option value="meal" data-i18n="cat_meal">Meal</option>
                <option value="office" data-i18n="cat_office">Office</option>
                <option value="other" data-i18n="cat_other">Other</option>
            </select>
        </section>

        <section class="summary">
            <div><span data-i18n="summary_total_records">Total Records</span> <span id="totalCount">0</span></div>
            <div><span data-i18n="summary_total_amount">Total Amount:</span> <span id="totalAmount">0</span></div>
        </section>

        <section class="list">
            <table id="expenseTable">
                <thead>
                    <tr>
                        <th data-i18n="table_date">Date</th>
                        <th data-i18n="table_category">Category</th>
                        <th data-i18n="table_amount">Amount</th>
                        <th data-i18n="table_payment">Payment</th>
                        <th data-i18n="table_receipt">Receipt</th>
                        <th data-i18n="table_note">Note</th>
                        <th data-i18n="table_actions">Actions</th>
                    </tr>
                </thead>

                <tbody id="expenseBody">
                </tbody>
            </table>
        </section>
    </main>

    <div id="modal" class="modal">
        <div class="modal-content">
            <h2 id="modalTitle">Add</h2>

            <form id="expenseForm">
                <label>
                    <span data-i18n="label_date">Date</span>:
                    <input type="date" id="f-date" required>
                </label>

                <label>
                    <span data-i18n="label_category">Category</span>:
                    <select id="f-category">
                        <option value="transport" data-i18n="cat_transport">Transport</option>
                        <option value="meal" data-i18n="cat_meal">Meal</option>
                        <option value="office" data-i18n="cat_office">Office</option>
                        <option value="other" data-i18n="cat_other">Other</option>
                    </select>
                </label>

                <label>
                    <span data-i18n="label_amount">Amount</span>:
                    <input type="number" id="f-amount" min="0" required>
                </label>

                <label>
                    <span data-i18n="label_payment">Payment</span>:
                    <select id="f-payment">
                        <option value="cash" data-i18n="pay_cash">Cash</option>
                        <option value="card" data-i18n="pay_card">Card</option>
                    </select>
                </label>

                <label>
                    <span data-i18n="label_receipt">Receipt</span>:
                    <input type="checkbox" id="f-receipt">
                </label>

                <label>
                    <span data-i18n="label_note">Note</span>:
                    <input type="text" id="f-note" data-i18n-placeholder="placeholder_note" placeholder="Optional note">
                </label>

                <div id="formError" class="error"></div>

                <div class="modal-actions">
                    <button type="button" id="cancelBtn" class="ghost">
                        <span data-i18n="btn_cancel">Cancel</span>
                    </button>
                    <button type="submit" id="saveBtn">
                        <span data-i18n="btn_save">Save</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="./app.js"></script>
</body>

</html>
